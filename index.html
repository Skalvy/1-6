<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <button class="animated-button">Наведи на меня</button>
        <div class="fade-in-block">
           <h2>Я плавно появился!</h2>
           <p>Этот блок возник из небытия за 1.5 секунды.</p>
        </div>
        <div class="container">
           <div class="moving-square"></div>
        </div>
        <div class="floor">
           <div class="ball"></div>
        </div>
        <div class="loader-container">
           <div class="loader"></div>
        </div>

        <button class="pulse-button">Нажми на меня</button>

    </body>
</html>
